services:
  postgres:
    image: postgres:16-alpine
    container_name: mercado-preto-db
    environment:
      POSTGRES_USER: medusa
      POSTGRES_PASSWORD: medusa
      POSTGRES_DB: mercado_preto
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medusa -d mercado_preto"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mercado-preto-redis
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: mercado-preto-search
    environment:
      MEILI_MASTER_KEY: mercadopreto_search_key
      MEILI_ENV: development
    ports:
      - "7701:7700"
    volumes:
      - meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  evolution-api:
    image: atendai/evolution-api:v2.2.3
    container_name: mercado-preto-evolution
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SERVER_URL: http://localhost:8080
      DEL_INSTANCE: "false"
      LANGUAGE: pt-BR
      # Auth
      AUTHENTICATION_TYPE: apikey
      AUTHENTICATION_API_KEY: mercadopreto_evo_key
      AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES: "true"
      # Banco de dados
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://medusa:medusa@postgres:5432/evolution
      DATABASE_CONNECTION_CLIENT_NAME: evolution
      # Cache
      CACHE_REDIS_URI: redis://redis:6379
      CACHE_REDIS_PREFIX_KEY: evolution
      CACHE_REDIS_ENABLED: "true"
      CACHE_REDIS_TTL: "604800"
      # QR Code
      QRCODE_LIMIT: "30"
      QRCODE_COLOR: "#00a884"
      # Override hardcoded WA version — update if WhatsApp rejects handshake again
      CONFIG_SESSION_PHONE_VERSION: "2.3000.1035194821"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - evolution_data:/evolution/instances

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  evolution_data:
