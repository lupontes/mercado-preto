worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    upstream medusa_api {
        server medusa:9000;
    }

    upstream storefront {
        server storefront:3000;
    }

    server {
        listen 80;
        server_name _;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl http2;
        # Root domain (mercadopreto.com.br / www) still points to the old store
        # and is intentionally left out of this config — only the new
        # marketplace's subdomain is served here.
        server_name teste.mercadopreto.com.br;

        ssl_certificate /etc/nginx/ssl/live/teste.mercadopreto.com.br/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/teste.mercadopreto.com.br/privkey.pem;

        location /api/ {
            proxy_pass http://medusa_api/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location / {
            proxy_pass http://storefront;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
