# =============================================================================
# Mercado Preto — Docker Compose PRODUÇÃO
# Pré-requisitos:
#   1. Criar o arquivo infra/.env a partir de infra/.env.template
#   2. Preencher todas as vars obrigatórias no .env
#   3. Certificados SSL em ./nginx/ssl/ ou usar Cloudflare em modo proxy
# Subir: docker compose -f docker-compose.prod.yml --env-file .env up -d
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    container_name: mercado-preto-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: mercado-preto-redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.13
    container_name: mercado-preto-search
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_ENV: production
    volumes:
      - meilisearch_data:/meili_data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  medusa:
    build:
      context: ../packages/medusa-backend
      dockerfile: Dockerfile
    container_name: mercado-preto-api
    environment:
      # --- Infra (geradas pelo compose) ---
      # sslmode=disable: Medusa defaults to requiring SSL for any non-localhost
      # DATABASE_URL host under NODE_ENV=production, but this Postgres
      # container doesn't have SSL configured — without this, the client
      # loops forever renegotiating SSL against a server that replies "N".
      DATABASE_URL: postgres://${DB_USER}:${DB_PASSWORD}@postgres:5432/${DB_NAME}?sslmode=disable
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      MEILISEARCH_HOST: http://meilisearch:7700
      MEILISEARCH_API_KEY: ${MEILI_MASTER_KEY}
      NODE_ENV: production

      # --- Segurança ---
      JWT_SECRET: ${JWT_SECRET}
      COOKIE_SECRET: ${COOKIE_SECRET}

      # --- CORS ---
      STORE_CORS: ${STORE_CORS}
      ADMIN_CORS: ${ADMIN_CORS}
      AUTH_CORS: ${AUTH_CORS}

      # --- MercadoPago ---
      MERCADOPAGO_ACCESS_TOKEN: ${MERCADOPAGO_ACCESS_TOKEN}

      # --- URL pública do backend (webhooks MercadoPago + file module) ---
      BACKEND_URL: ${BACKEND_URL}

      # --- Focus NFe (fiscal) ---
      FOCUS_NFE_TOKEN: ${FOCUS_NFE_TOKEN}
      FOCUS_NFE_SANDBOX: ${FOCUS_NFE_SANDBOX:-false}
      FOCUS_NFE_CNPJ: ${FOCUS_NFE_CNPJ}
      FOCUS_NFE_IE: ${FOCUS_NFE_IE}
      FOCUS_NFE_ADDRESS_STREET: ${FOCUS_NFE_ADDRESS_STREET}
      FOCUS_NFE_ADDRESS_NUMBER: ${FOCUS_NFE_ADDRESS_NUMBER}
      FOCUS_NFE_ADDRESS_DISTRICT: ${FOCUS_NFE_ADDRESS_DISTRICT}
      FOCUS_NFE_ADDRESS_CITY: ${FOCUS_NFE_ADDRESS_CITY}
      FOCUS_NFE_ADDRESS_STATE: ${FOCUS_NFE_ADDRESS_STATE}
      FOCUS_NFE_ADDRESS_ZIP: ${FOCUS_NFE_ADDRESS_ZIP}

      # --- Melhor Envio (frete) ---
      MELHOR_ENVIO_TOKEN: ${MELHOR_ENVIO_TOKEN}
      MELHOR_ENVIO_ORIGIN_CEP: ${MELHOR_ENVIO_ORIGIN_CEP:-44300000}

      # --- Brevo (e-mail) ---
      BREVO_API_KEY: ${BREVO_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@mercadopreto.com.br}

      # --- Evolution API (WhatsApp) ---
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_API_INSTANCE: ${EVOLUTION_API_INSTANCE}
      EVOLUTION_WEBHOOK_SECRET: ${EVOLUTION_WEBHOOK_SECRET}

      # --- ClearSale (antifraude) ---
      CLEARSALE_WEBHOOK_SECRET: ${CLEARSALE_WEBHOOK_SECRET}

      # --- Plausible (analytics) ---
      PLAUSIBLE_URL: ${PLAUSIBLE_URL}
      PLAUSIBLE_DOMAIN: ${PLAUSIBLE_DOMAIN:-mercadopreto.com.br}

      # --- Comissão padrão ---
      MARKETPLACE_COMMISSION_RATE: ${MARKETPLACE_COMMISSION_RATE:-15}

    ports:
      - "9000:9000"
    volumes:
      - backend_uploads:/app/static
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
    restart: unless-stopped

  storefront:
    build:
      context: ..
      dockerfile: apps/storefront/Dockerfile
      args:
        NEXT_PUBLIC_MEDUSA_URL: ${NEXT_PUBLIC_MEDUSA_URL}
        NEXT_PUBLIC_PUBLISHABLE_KEY: ${NEXT_PUBLIC_PUBLISHABLE_KEY}
        NEXT_PUBLIC_REGION_ID: ${NEXT_PUBLIC_REGION_ID}
        NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY: ${NEXT_PUBLIC_MERCADOPAGO_PUBLIC_KEY}
    container_name: mercado-preto-storefront
    restart: unless-stopped
    depends_on:
      - medusa

  nginx:
    image: nginx:alpine
    container_name: mercado-preto-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certbot/conf:/etc/nginx/ssl:ro
      - ./nginx/certbot/www:/var/www/certbot:ro
    depends_on:
      - medusa
      - storefront
    restart: unless-stopped
    command: sh -c 'while :; do sleep 6h; nginx -s reload; done & exec nginx -g "daemon off;"'

  certbot:
    image: certbot/certbot:latest
    container_name: mercado-preto-certbot
    volumes:
      - ./nginx/certbot/conf:/etc/letsencrypt
      - ./nginx/certbot/www:/var/www/certbot
    entrypoint: sh -c 'trap exit TERM; while :; do sleep 12h; certbot renew --webroot -w /var/www/certbot --quiet; done'

volumes:
  postgres_data:
  redis_data:
  meilisearch_data:
  backend_uploads:
